name: bump-nixpkgs

on:
  workflow_dispatch:
  schedule:
    # Daily at 04:17 UTC
    - cron: '17 4 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main 2026-05-25
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            extra-substituters = https://cache.numtide.com
            extra-trusted-public-keys = niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

      - name: Update nixpkgs
        run: nix flake update nixpkgs --commit-lock-file

      - name: Create pull request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          title: 'flake.lock: bump nixpkgs'
          commit-message: 'flake.lock: bump nixpkgs'
          body: |
            Automated daily bump of the `nixpkgs` flake input.

            Auto-merges once `buildbot/nix-build` passes (see auto-merge-bump.yml).
          branch: bump-nixpkgs
          delete-branch: true
