name: release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main 2026-05-25
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            extra-substituters = https://cache.numtide.com
            extra-trusted-public-keys = niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

      - name: Compute next release tag
        id: tag
        run: scripts/release/next-tag.sh

      - name: Build ISO
        run: scripts/release/build-iso.sh

      - name: Upload ISO
        id: upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.geninf_s3_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.geninf_s3_key }}
        run: scripts/release/upload-artifacts.sh "${{ steps.tag.outputs.tag }}"

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body: |
            ## Downloads

            - **ISO**: <${{ steps.upload.outputs.iso_url }}>
            - **SHA256**: <${{ steps.upload.outputs.sha256_url }}>
