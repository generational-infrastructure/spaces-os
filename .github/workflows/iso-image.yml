name: iso-image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'hosts/installer-target/**'
      - 'hosts/installer-target-aarch64/**'
      - 'modules/**'
      - 'packages/**'
      - 'overlays/**'
      - '.github/workflows/iso-image.yml'
  pull_request:
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'hosts/installer-target/**'
      - 'hosts/installer-target-aarch64/**'
      - 'modules/nixos/installer-iso.nix'
      - '.github/workflows/iso-image.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main 2026-05-25
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            extra-substituters = https://cache.numtide.com
            extra-trusted-public-keys = niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

      - run: nix build .#iso.x86_64-linux.installer --print-build-logs

      - id: locate
        run: |
          set -euo pipefail
          iso=$(find -L result -maxdepth 3 -type f -name '*.iso' | head -n1)
          if [ -z "$iso" ]; then
            echo "no iso under result/" >&2
            find -L result -maxdepth 3 >&2
            exit 1
          fi
          echo "path=$iso" >>"$GITHUB_OUTPUT"
          ls -lh "$iso"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distro-installer-iso-${{ github.sha }}
          path: ${{ steps.locate.outputs.path }}
          retention-days: 14
          compression-level: 0
          if-no-files-found: error
