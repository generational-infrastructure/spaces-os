name: iso

# Builds the installer ISO and uploads it as a workflow artifact on
# every push to main and every pull request (no path filter — any
# change can affect the image, so always rebuild).
#
# When triggered manually via the "Run workflow" button
# (workflow_dispatch), it additionally cuts a release: the ISO is
# pushed to object storage and a dated `spaces-YYYY.MM.DD` tag and
# GitHub release are created.
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  iso:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # GitHub-hosted runners ship ~14 GB free, which the Nix-built ISO
      # overflows ("No space left on device"). Reclaim the preinstalled
      # toolchains we don't use before building.
      - uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true

      - uses: NixOS/nix-installer-action@6b8548fe06acfb0155a50ab5d561accb215764cc # main 2026-05-25
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            extra-substituters = https://cache.numtide.com
            extra-trusted-public-keys = niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

      - name: Build ISO
        run: scripts/release/build-iso.sh

      - name: Locate ISO
        id: locate
        run: |
          set -euo pipefail
          iso=$(find -L result -maxdepth 3 -type f -name '*.iso' | head -n1)
          if [ -z "$iso" ]; then
            echo "no iso under result/" >&2
            find -L result -maxdepth 3 >&2
            exit 1
          fi
          echo "path=$iso" >>"$GITHUB_OUTPUT"
          ls -lh "$iso"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spaces-installer-iso-${{ github.sha }}
          path: ${{ steps.locate.outputs.path }}
          retention-days: 14
          compression-level: 0
          if-no-files-found: error

      # --- Release: manual dispatch only ---
      - name: Compute next release tag
        if: github.event_name == 'workflow_dispatch'
        id: tag
        run: scripts/release/next-tag.sh

      - name: Upload ISO to object storage
        if: github.event_name == 'workflow_dispatch'
        id: upload
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.geninf_s3_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.geninf_s3_key }}
        run: scripts/release/upload-artifacts.sh "${{ steps.tag.outputs.tag }}"

      - name: Create release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body: |
            ## Downloads

            - **ISO**: <${{ steps.upload.outputs.iso_url }}>
            - **SHA256**: <${{ steps.upload.outputs.sha256_url }}>
