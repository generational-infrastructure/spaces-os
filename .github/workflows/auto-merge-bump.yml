name: auto-merge-bump

# buildbot-nix reports as a commit *status* (not a check-run), so we trigger on
# the `status` event and merge the bump PR once `buildbot/nix-build` is green.
# This gates only the bump PR and needs no branch protection on main.
on:
  status: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: github.event.context == 'buildbot/nix-build' && github.event.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Merge bump-nixpkgs PR if green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.sha }}
        run: |
          set -euo pipefail
          pr=$(gh api "repos/$REPO/commits/$SHA/pulls" \
            --jq '.[] | select(.state == "open" and .head.ref == "bump-nixpkgs" and .user.login == "github-actions[bot]") | .number' \
            | head -n1)
          if [ -z "$pr" ]; then
            echo "No open bump-nixpkgs PR at $SHA authored by github-actions[bot]; nothing to merge."
            exit 0
          fi
          echo "buildbot/nix-build passed for $SHA; merging PR #$pr"
          gh pr merge "$pr" --repo "$REPO" --squash --delete-branch
