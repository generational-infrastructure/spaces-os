# Spaces Calamares welcome config.
#
# Forked from calamares-nixos-extensions/config/modules/welcome.conf.
# Differences vs upstream:
#   - `internet` removed from both `check` and `required` because the
#     spaces installer pre-stages all store paths on the ISO for fully
#     offline installation.
showReleaseNotesUrl: true

requirements:
    requiredStorage: 10
    requiredRam: 3.0

    check:
        - storage
        - ram
        - power
        - screen

    required:
        - storage
        - ram
