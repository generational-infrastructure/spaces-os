[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "integration-contacts"
version = "0.1.0"
description = "Contacts (CardDAV) MCP integration server (spaces integration POC)"
license = "MIT"
requires-python = ">=3.10"
dependencies = ["spaces-integration-mcp"]

[tool.hatch.build.targets.wheel]
only-include = ["integration_contacts.py"]

[project.scripts]
integration-contacts = "integration_contacts:main"
