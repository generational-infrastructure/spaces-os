<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#15151b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>pi</title>
    <style>
      :root { color-scheme: dark; --bg: #15151b; --panel: #1e1e27; --line: #2c2c38; --me: #2f6df0; --on-me: #fff; --peer: #262633; --on: #e7e7ee; --muted: #8a8a99; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg); color: var(--on); font: 15px/1.45 system-ui, sans-serif; }
      #gate { display: flex; height: 100%; align-items: center; justify-content: center; flex-direction: column; gap: 12px; padding: 24px; }
      #gate h1 { font-size: 20px; margin: 0 0 8px; }
      #gate input, #input { background: var(--panel); color: var(--on); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font: inherit; }
      #gate input { width: min(360px, 90vw); }
      button { background: var(--me); color: var(--on-me); border: 0; border-radius: 10px; padding: 10px 16px; font: inherit; cursor: pointer; }
      button.deny { background: var(--peer); color: var(--on); }
      #app { display: none; height: 100%; flex-direction: column; }
      header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--line); }
      header b { font-weight: 600; }
      #status { color: var(--muted); font-size: 13px; }
      #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
      .msg { max-width: 80%; padding: 8px 12px; border-radius: 14px; white-space: pre-wrap; word-wrap: break-word; }
      .msg.user { align-self: flex-end; background: var(--me); color: var(--on-me); }
      .msg.assistant { align-self: flex-start; background: var(--peer); }
      .confirm { align-self: stretch; background: var(--panel); border: 1px solid var(--me); border-radius: 12px; padding: 12px; }
      .confirm.allowed { border-color: #3ba55d; } .confirm.denied, .confirm.resolved { border-color: var(--line); }
      .confirm .title { font-weight: 600; margin-bottom: 8px; }
      .confirm .actions { display: flex; gap: 8px; justify-content: flex-end; }
      .confirm .outcome { text-align: right; color: var(--muted); font-size: 13px; }
      .typing { color: var(--muted); align-self: flex-start; padding: 0 12px; }
      footer { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid var(--line); }
      #input { flex: 1; }
      #tabs { display: flex; gap: 6px; padding: 8px 14px; overflow-x: auto; border-bottom: 1px solid var(--line); }
      .tab { background: var(--peer); color: var(--on); border: 1px solid var(--line); border-radius: 999px; padding: 4px 6px 4px 12px; font-size: 13px; white-space: nowrap; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
      .tab.active { background: var(--me); color: var(--on-me); border-color: var(--me); }
      .tab.new { font-weight: 700; padding: 4px 12px; }
      .tab-close { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 999px; font-size: 14px; line-height: 1; opacity: 0.55; }
      .tab-close:hover { opacity: 1; background: rgba(255,255,255,0.18); }
      .tab.active .tab-close:hover { background: rgba(0,0,0,0.18); }
    </style>
  </head>
  <body>
    <div id="gate">
      <h1>pi</h1>
      <input id="token" type="password" placeholder="executor token" autocomplete="off" />
      <button id="connect">Connect</button>
    </div>
    <div id="app">
      <header><b>pi</b><span id="status">disconnected</span></header>
      <div id="tabs"></div>
      <div id="log"></div>
      <footer>
        <input id="input" placeholder="Message…" autocomplete="off" />
        <button id="send">Send</button>
      </footer>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
