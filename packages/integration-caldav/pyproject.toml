[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "integration-caldav"
version = "0.1.0"
description = "CalDAV MCP integration server (spaces integration POC)"
license = "MIT"
requires-python = ">=3.10"
dependencies = ["spaces-integration-mcp"]

[tool.hatch.build.targets.wheel]
only-include = ["integration_caldav.py"]

[project.scripts]
integration-caldav = "integration_caldav:main"
