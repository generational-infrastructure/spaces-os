<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="stylesheet" href="/design/styles.css" />
    <title>Spaces OS — UI kits</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: linear-gradient(180deg, #fff 0%, var(--clan-secondary-50) 100%);
        font-family: var(--font-ui);
        color: var(--ink-900);
      }
      * {
        box-sizing: border-box;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 80px 24px;
      }
      h1 {
        font-family: var(--font-display);
        font-size: 40px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
      }
      .accent {
        font-family: var(--font-serif);
        font-style: italic;
        font-weight: 400;
        color: var(--kin-sage);
      }
      p.lede {
        color: var(--ink-500);
        font-size: 16px;
        margin: 0 0 40px;
        line-height: 1.5;
      }
      .kits {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
      }
      a.kit {
        display: block;
        padding: 24px;
        border-radius: var(--radius-xl);
        background: #fff;
        box-shadow: var(--ring-hairline);
        text-decoration: none;
        color: inherit;
        transition: box-shadow var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out);
      }
      a.kit:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-2px);
      }
      a.kit h2 {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 6px;
      }
      a.kit span {
        color: var(--ink-500);
        font-size: 14px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>A new <span class="accent">kinder</span> computer</h1>
      <p class="lede">Spaces OS UI kits — flagship product surfaces, built on the Kin design system.</p>
      <div class="kits">
        <a class="kit" href="/files/">
          <h2>Files</h2>
          <span>A Finder-style file browser — rail, search, sectioned tiles, grid/list.</span>
        </a>
        <a class="kit" href="/home/">
          <h2>Arlo home</h2>
          <span>The Space desktop where you talk to Arlo, your private local agent.</span>
        </a>
      </div>
    </main>
  </body>
</html>
