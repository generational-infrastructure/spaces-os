<!-- @dsCard group="Components" viewport="700x300" name="Core" subtitle="One control family — shared 6px radius, 1px outline, Inter Medium label" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--m-surface); padding: 22px; font-family: var(--font-sans); color: var(--m-on-surface); }
  .lbl { font: var(--weight-medium) var(--text-xs)/1 var(--font-mono); color: var(--m-on-surface-variant); text-transform: uppercase; letter-spacing: var(--tracking-wide); margin: 0 0 9px; }
  .group { margin-bottom: 16px; }
  .rowflex { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; height: 28px; padding: 0 13px; border-radius: var(--radius-input); border: 1px solid var(--m-outline); font: var(--weight-medium) var(--text-m)/1 var(--font-sans); cursor: pointer; }
  .ib { display: inline-flex; align-items: center; justify-content: center; width: 33px; height: 33px; border-radius: 6px; border: 1px solid var(--m-outline); background: var(--m-surface-variant); color: var(--m-primary); cursor: pointer; }
  .ib.active { background: var(--m-error); color: var(--m-on-error); border-color: var(--m-error); }
  .chip { display: inline-flex; align-items: center; gap: 6px; height: 26px; padding: 0 8px; border-radius: var(--radius-input); border: 1px solid var(--m-outline); background: var(--m-surface-variant); font: var(--weight-medium) var(--text-s)/1 var(--font-mono); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .input { background: var(--m-surface-variant); border: 1px solid var(--m-outline); border-radius: var(--radius-input); padding: 8px 12px; color: var(--m-on-surface); font: var(--weight-medium) var(--text-m)/1.2 var(--font-sans); width: 100%; box-sizing: border-box; }
  .input.compose { background: var(--m-surface); border-color: var(--m-secondary); }
  .ic { width: 16px; height: 16px; display: inline-flex; }
  .ic svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
  <div class="group">
    <div class="lbl">Buttons — filled, hairline outline, 6px</div>
    <div class="rowflex">
      <span class="btn" style="background: var(--m-primary); color: var(--m-on-primary);">Send</span>
      <span class="btn" style="background: var(--m-surface-variant); color: var(--m-on-surface);">Cancel</span>
      <span class="btn" style="background: var(--m-error); color: var(--m-on-error);"><span class="ic" data-i="eraser"></span>Wipe</span>
      <span class="btn" style="background: var(--m-primary); color: var(--m-on-primary); opacity: .6;">Disabled</span>
    </div>
  </div>
  <div class="group">
    <div class="lbl">Icon buttons — same chip, same radius</div>
    <div class="rowflex">
      <span class="ib"><span class="ic" data-i="search"></span></span>
      <span class="ib"><span class="ic" data-i="paperclip"></span></span>
      <span class="ib"><span class="ic" data-i="rotate"></span></span>
      <span class="ib active"><span class="ic" data-i="microphone"></span></span>
      <span class="ib"><span class="ic" data-i="send"></span></span>
    </div>
  </div>
  <div class="group">
    <div class="lbl">Machine chips &amp; status</div>
    <div class="rowflex">
      <span class="chip"><span class="dot" style="background: var(--m-tertiary);"></span><span style="color: var(--m-primary);">kiwi</span></span>
      <span class="chip"><span class="dot" style="background: var(--m-error);"></span><span style="color: var(--m-secondary);">studio</span></span>
      <span class="chip"><span class="dot" style="background: var(--m-primary);"></span><span style="color: var(--m-tertiary);">nas</span></span>
      <span class="chip" style="background: var(--m-primary); border-color: transparent;"><span class="dot" style="background: var(--m-on-primary);"></span><span style="color: var(--m-on-primary);">kiwi</span></span>
    </div>
  </div>
  <div class="group" style="margin-bottom: 0;">
    <div class="lbl">Inputs — outline turns accent on focus</div>
    <div style="display: flex; gap: 10px;">
      <div class="input" style="flex: 1; color: var(--m-on-surface-variant);">Search messages…</div>
      <div class="input compose" style="flex: 1; color: var(--m-on-surface-variant);">Message kiwi…</div>
    </div>
  </div>
  <script>
    document.querySelectorAll(".ic[data-i]").forEach(async el => {
      try { el.innerHTML = await (await fetch(`../../assets/icons/${el.dataset.i}.svg`)).text(); } catch (e) {}
    });
  </script>
</body>
</html>
