<!-- @dsCard group="Brand" viewport="700x230" name="Iconography" subtitle="Tabler Icons (outline, 2px stroke, currentColor) — the exact set vendored in pi-chat" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--m-surface); padding: 22px; font-family: var(--font-sans); color: var(--m-on-surface); }
  .grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 16px 14px; }
  .ic { width: 24px; height: 24px; color: var(--m-on-surface); display: flex; }
  .ic svg { width: 24px; height: 24px; display: block; }
  .accent { color: var(--m-primary); }
  .note { margin-top: 18px; font: var(--weight-medium) var(--text-xs)/1.4 var(--font-mono); color: var(--m-on-surface-variant); }
</style>
</head>
<body>
  <div class="grid" id="grid"></div>
  <div class="note">message-chatbot · sparkles · send · paperclip · microphone · brain · search · rotate · eraser · settings · key · gauge · plus · x …</div>
  <script>
    const names = ["message-chatbot","sparkles","send","paperclip","microphone","microphone-off","brain","database-off","search","rotate","eraser","settings","key","gauge","edit","plus","x","check","eye","eye-off","dots-vertical","chevron-up","chevron-down","corner-down-right","message-circle","message-circle-off"];
    const grid = document.getElementById("grid");
    names.forEach(async (n, i) => {
      const s = document.createElement("span");
      s.className = "ic" + (i < 5 ? " accent" : "");
      s.title = n;
      grid.appendChild(s);
      try {
        const r = await fetch(`../../assets/icons/${n}.svg`);
        s.innerHTML = await r.text();
      } catch (e) {}
    });
  </script>
</body>
</html>
