<!-- @dsCard group="Colors" viewport="700x190" name="Surfaces & outline" subtitle="The deep-indigo surface stack that separates by fill + 1px hairline, not shadow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--m-surface); padding: 20px; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-s); border: var(--border); overflow: hidden; }
  .chip { height: 72px; }
  .meta { padding: 8px 10px; background: var(--m-surface-variant); border-top: var(--border); }
  .meta b { display: block; font: var(--weight-medium) var(--text-s)/1.3 var(--font-sans); color: var(--m-on-surface); }
  .meta code { font: var(--weight-medium) var(--text-xs)/1.4 var(--font-mono); color: var(--m-on-surface-variant); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background: var(--m-surface);"></div>
      <div class="meta"><b>Surface</b><code>#070722</code></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--m-surface-variant);"></div>
      <div class="meta"><b>Surface variant</b><code>#11112d</code></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--m-outline);"></div>
      <div class="meta"><b>Outline</b><code>#21215f</code></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--m-on-surface);"></div>
      <div class="meta"><b>On-surface</b><code>#f3edf7</code></div>
    </div>
  </div>
</body>
</html>
