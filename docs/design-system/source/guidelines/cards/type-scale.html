<!-- @dsCard group="Type" viewport="700x300" name="Type scale" subtitle="Inter — the panel's pt sizes re-expressed as px (XS 12 → XL 21), plus web display sizes" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--m-surface); padding: 22px; font-family: var(--font-sans); color: var(--m-on-surface); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; }
  .tag { flex: none; width: 96px; font: var(--weight-medium) var(--text-xs)/1 var(--font-mono); color: var(--m-on-surface-variant); }
  .spec { font-weight: var(--weight-medium); letter-spacing: var(--tracking-tight); }
</style>
</head>
<body>
  <div class="line"><span class="tag">3xl · 40</span><span class="spec" style="font-size: var(--text-3xl); font-weight: var(--weight-bold);">Self-hosted agents</span></div>
  <div class="line"><span class="tag">2xl · 28</span><span class="spec" style="font-size: var(--text-2xl); font-weight: var(--weight-semibold);">Run on your machines</span></div>
  <div class="line"><span class="tag">xl · 21</span><span class="spec" style="font-size: var(--text-xl);">Launcher &amp; header glyph</span></div>
  <div class="line"><span class="tag">l · 17</span><span class="spec" style="font-size: var(--text-l); font-weight: var(--weight-bold);">Peer name / heading</span></div>
  <div class="line"><span class="tag">m · 15</span><span class="spec" style="font-size: var(--text-m);">Message body — the default</span></div>
  <div class="line"><span class="tag">s · 13</span><span class="spec" style="font-size: var(--text-s); color: var(--m-on-surface-variant);">Secondary labels, hints, combo items</span></div>
  <div class="line"><span class="tag">xs · 12</span><span class="spec" style="font-size: var(--text-xs); color: var(--m-on-surface-variant);">Quotes · timestamps · thinking trace</span></div>
</body>
</html>
