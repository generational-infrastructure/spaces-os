<!-- @dsCard group="Brand" viewport="700x200" name="Machine colour-coding" subtitle="Each executor gets one stable palette colour + its hostname — the cornerstone of the multi-machine UX" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--m-surface); padding: 22px; font-family: var(--font-sans); color: var(--m-on-surface); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 8px; height: 30px; padding: 0 14px;
          border: var(--border); border-radius: var(--radius-input); background: var(--m-surface-variant);
          font: var(--weight-medium) var(--text-s)/1 var(--font-mono); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--m-tertiary); }
  .desc { margin-top: 16px; font: var(--weight-medium) var(--text-s)/1.5 var(--font-sans); color: var(--m-on-surface-variant); max-width: 620px; }
  .solid { background: var(--m-primary); color: var(--m-on-primary); border-color: transparent; }
  .solid .dot { background: var(--m-on-primary); }
</style>
</head>
<body>
  <div class="row">
    <span class="chip"><span class="dot"></span><span style="color: var(--m-primary);">kiwi</span></span>
    <span class="chip"><span class="dot"></span><span style="color: var(--m-secondary);">studio</span></span>
    <span class="chip"><span class="dot" style="background: var(--m-error);"></span><span style="color: var(--m-tertiary);">nas</span></span>
    <span class="chip solid"><span class="dot"></span><span>kiwi · active</span></span>
  </div>
  <div class="desc">Colour answers <b style="color:var(--m-on-surface)">which</b> machine; the status dot answers <b style="color:var(--m-on-surface)">can I reach it</b> (mint online · pink offline). The same colour follows a machine across tabs, headers and chat-list rows.</div>
</body>
</html>
