<!-- @dsCard group="Type" viewport="700x230" name="Families" subtitle="Inter for UI · JetBrains Mono for code, shell commands & machine hostnames" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--m-surface); padding: 22px; font-family: var(--font-sans); color: var(--m-on-surface); }
  .fam { padding: 6px 0; }
  .fam + .fam { margin-top: 14px; border-top: var(--border); padding-top: 16px; }
  .name { font: var(--weight-medium) var(--text-xs)/1 var(--font-mono); color: var(--m-on-surface-variant); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
  .big { font-size: 30px; font-weight: var(--weight-medium); margin: 8px 0 4px; letter-spacing: var(--tracking-tight); }
  .glyphs { font-size: var(--text-s); color: var(--m-on-surface-variant); }
  .mono { font-family: var(--font-mono); }
  .code { font-family: var(--font-mono); font-size: var(--text-s); color: var(--m-on-surface); background: var(--m-surface-variant); border: var(--border); border-radius: var(--radius-xs); padding: 8px 10px; display: inline-block; margin-top: 6px; }
</style>
</head>
<body>
  <div class="fam">
    <div class="name">Inter — UI / Sans</div>
    <div class="big">Message kiwi… 500 weight</div>
    <div class="glyphs">ABCDEFGHIJKLM abcdefghijklm 0123456789 — medium (500) is the workhorse, bold (700) for emphasis</div>
  </div>
  <div class="fam">
    <div class="name">JetBrains Mono — Code / Hostnames</div>
    <div class="big mono">kiwi · studio · nas</div>
    <span class="code">$ pi-chat-toggle show</span>
  </div>
</body>
</html>
