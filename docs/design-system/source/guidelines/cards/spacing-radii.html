<!-- @dsCard group="Spacing" viewport="700x200" name="Radii · borders · motion" subtitle="Tight 2 / 4 / 6px corners · 1px outlines · 150ms InOutQuad — flat and crisp, no pills" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--m-surface); padding: 22px; font-family: var(--font-sans); color: var(--m-on-surface); display: flex; gap: 18px; align-items: center; }
  .box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sq { width: 92px; height: 72px; background: var(--m-surface-variant); border: var(--border); }
  .cap { font: var(--weight-medium) var(--text-xs)/1.3 var(--font-mono); color: var(--m-on-surface-variant); text-align: center; }
  .cap b { display:block; color: var(--m-on-surface); font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="box"><div class="sq" style="border-radius: var(--radius-xs);"></div><div class="cap"><b>radius-xs</b>2px · chips, badges</div></div>
  <div class="box"><div class="sq" style="border-radius: var(--radius-s);"></div><div class="cap"><b>radius-s</b>4px · bubbles, cards</div></div>
  <div class="box"><div class="sq" style="border-radius: var(--radius-input);"></div><div class="cap"><b>radius-input</b>6px · buttons, inputs</div></div>
  <div class="box"><div class="sq" style="border: 2px solid var(--m-primary); background: transparent;"></div><div class="cap"><b>border</b>1px outline · flat</div></div>
</body>
</html>
