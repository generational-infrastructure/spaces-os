<!-- @dsCard group="Colors" viewport="700x190" name="Accent roles" subtitle="Primary chartreuse · secondary periwinkle · tertiary mint, each with its ink" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--m-surface); padding: 20px; font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-s); border: var(--border); overflow: hidden; }
  .chip { height: 84px; display: flex; align-items: flex-end; padding: 10px; }
  .chip span { font: var(--weight-bold) var(--text-s)/1 var(--font-mono); }
  .meta { padding: 8px 10px; background: var(--m-surface-variant); }
  .meta b { display: block; font: var(--weight-medium) var(--text-s)/1.3 var(--font-sans); color: var(--m-on-surface); }
  .meta code { font: var(--weight-medium) var(--text-xs)/1.4 var(--font-mono); color: var(--m-on-surface-variant); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background: var(--m-primary);"><span style="color: var(--m-on-primary);">On-primary</span></div>
      <div class="meta"><b>Primary</b><code>#fff59b</code></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--m-secondary);"><span style="color: var(--m-on-secondary);">On-secondary</span></div>
      <div class="meta"><b>Secondary</b><code>#a9aefe</code></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--m-tertiary);"><span style="color: var(--m-on-tertiary);">On-tertiary</span></div>
      <div class="meta"><b>Tertiary</b><code>#9bfece</code></div>
    </div>
  </div>
</body>
</html>
