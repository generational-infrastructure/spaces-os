<!-- @dsCard group="Colors" viewport="700x180" name="Status & text" subtitle="Mint = reachable/success · pink = error/recording · lavender-grey = muted text" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; background: var(--m-surface); padding: 20px; font-family: var(--font-sans); color: var(--m-on-surface); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 28px; align-items: center; }
  .item { display: flex; align-items: center; gap: 12px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex: none; }
  .lbl b { display: block; font: var(--weight-medium) var(--text-m)/1.3 var(--font-sans); }
  .lbl code { font: var(--weight-medium) var(--text-xs)/1.4 var(--font-mono); color: var(--m-on-surface-variant); }
  .txt { font: var(--weight-medium) var(--text-m)/1.3 var(--font-sans); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><span class="dot" style="background: var(--m-tertiary);"></span><span class="lbl"><b>Positive / online</b><code>--m-tertiary #9bfece</code></span></div>
    <div class="item"><span class="dot" style="background: var(--m-error);"></span><span class="lbl"><b>Error / offline / recording</b><code>--m-error #fd4663</code></span></div>
    <div class="item"><span class="txt" style="color: var(--m-on-surface);">Body text — on-surface</span></div>
    <div class="item"><span class="txt" style="color: var(--m-on-surface-variant);">Muted text — on-surface-variant</span></div>
    <div class="item"><span class="txt" style="color: var(--m-secondary);">Link — secondary periwinkle</span></div>
    <div class="item"><span class="txt" style="color: var(--m-primary);">Accent text — primary</span></div>
  </div>
</body>
</html>
